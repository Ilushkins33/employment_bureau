<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — Бюро по трудоустройству</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__brand">Бюро <span>по трудоустройству</span></a>
  </div>
</nav>

<main class="page page--narrow page--login">
  <div class="auth-box">
    <div class="auth-box__title">Вход в систему</div>
    <div class="auth-box__sub">Войдите, чтобы продолжить работу</div>

    <div class="form__group">
      <label class="form__label">Email <span class="form__required">*</span></label>
      <input type="email" id="email" class="input" placeholder="example@mail.ru">
    </div>
    <div class="form__group">
      <label class="form__label">Пароль <span class="form__required">*</span></label>
      <input type="password" id="password" class="input" placeholder="Минимум 8 символов">
    </div>

    <div id="err-msg" class="text-danger text-sm mb-8"></div>

    <button id="btn-login" class="btn btn--primary btn--full btn--lg" onclick="doLogin()">Войти</button>

    <div class="auth-divider">или</div>

    <div class="auth-link-row">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>

    <div class="demo-accounts">
      <strong>Демо-аккаунты:</strong><br>
      Сотрудник бюро: <code>admin@bureau.ru</code> / <code>Admin123!</code><br>
      Работодатель: <code>employer@demo.ru</code> / <code>Employer123!</code><br>
      Соискатель: <code>applicant@demo.ru</code> / <code>Applicant123!</code>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="auth.js"></script>
</body>
</html>
