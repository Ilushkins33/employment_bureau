<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск и сопоставление — Бюро по трудоустройству</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="search.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar__inner">
    <a href="index.html" class="navbar__brand">Бюро <span>по трудоустройству</span></a>
    <a href="vacancies.html" class="navbar__link">Вакансии</a>
    <div id="nav-auth">
      <a href="resumes.html"   class="navbar__link" data-role="admin,employer">Резюме</a>
      <a href="search.html"    class="navbar__link active" data-role="admin,employer">Поиск</a>
      <a href="analytics.html" class="navbar__link" data-role="admin">Аналитика</a>
      <div class="navbar__sep"></div>
      <a href="dashboard.html" class="navbar__link">
        <div class="navbar__user">
          <div class="navbar__avatar" id="nav-avatar">?</div>
          <span id="nav-name"></span>
        </div>
      </a>
      <button id="btn-logout" class="btn btn--ghost btn--sm">Выйти</button>
    </div>
  </div>
</nav>

<main class="page">
  <h1 class="section__title search-title">Поиск и сопоставление</h1>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('vacancies', this)">🔍 Поиск вакансий</button>
    <button class="tab-btn"        onclick="switchTab('resumes',   this)">📄 Поиск резюме</button>
    <button class="tab-btn"        onclick="switchTab('match',     this)">🎯 Сопоставление</button>
  </div>

  <!-- Вкладка: поиск вакансий -->
  <div id="tab-vacancies">
    <div class="filters">
      <div class="filters__field filters__field--grow">
        <label class="filters__label">Ключевые слова</label>
        <input type="text" id="sv-q" class="input" placeholder="Должность, навык, категория…">
      </div>
      <div class="filters__field">
        <label class="filters__label">Город</label>
        <input type="text" id="sv-location" class="input filters__field--city" placeholder="Иркутск">
      </div>
      <div class="filters__field">
        <label class="filters__label">Занятость</label>
        <select id="sv-employment" class="select">
          <option value="">Любая</option>
          <option value="full">Полная</option>
          <option value="part">Частичная</option>
          <option value="remote">Удалённо</option>
          <option value="contract">Контракт</option>
        </select>
      </div>
      <div class="filters__field">
        <label class="filters__label">Опыт</label>
        <select id="sv-experience" class="select">
          <option value="">Любой</option>
          <option value="без опыта">Без опыта</option>
          <option value="до 1 года">До 1 года</option>
          <option value="1-3 года">1–3 года</option>
          <option value="3-5 лет">3–5 лет</option>
          <option value="5+ лет">5+ лет</option>
        </select>
      </div>
      <div class="filters__field">
        <label class="filters__label">Зарплата от (₽)</label>
        <input type="number" id="sv-salary" class="input filters__field--salary-sm" placeholder="50000">
      </div>
      <button class="btn btn--primary" onclick="searchVacancies()">Найти</button>
    </div>
    <div id="sv-count" class="text-sm text-2 mb-16"></div>
    <div id="sv-results" class="grid"></div>
  </div>

  <!-- Вкладка: поиск резюме -->
  <div id="tab-resumes" class="hidden">
    <div class="filters">
      <div class="filters__field filters__field--grow">
        <label class="filters__label">Ключевые слова</label>
        <input type="text" id="sr-q" class="input" placeholder="Должность, описание…">
      </div>
      <div class="filters__field">
        <label class="filters__label">Навык</label>
        <input type="text" id="sr-skill" class="input filters__field--skill" placeholder="PHP, 1С…">
      </div>
      <div class="filters__field">
        <label class="filters__label">Город</label>
        <input type="text" id="sr-location" class="input filters__field--city" placeholder="Иркутск">
      </div>
      <div class="filters__field">
        <label class="filters__label">Зарплата до (₽)</label>
        <input type="number" id="sr-salary" class="input filters__field--city" placeholder="100000">
      </div>
      <button class="btn btn--primary" onclick="searchResumes()">Найти</button>
    </div>
    <div id="sr-count" class="text-sm text-2 mb-16"></div>
    <div id="sr-results"></div>
  </div>

  <!-- Вкладка: сопоставление -->
  <div id="tab-match" class="hidden">
    <div class="card match-select-card">
      <div class="match-select-card__label">Выберите вакансию для поиска подходящих кандидатов</div>
      <div class="form__group">
        <select id="match-vacancy" class="select">
          <option value="">— Выберите вакансию —</option>
        </select>
      </div>
      <button class="btn btn--primary" onclick="runMatch()">🎯 Найти подходящих кандидатов</button>
    </div>
    <div id="match-results"></div>
  </div>
</main>

<div id="toast-container"></div>
<script src="shared.js"></script>
<script src="search.js"></script>
</body>
</html>
